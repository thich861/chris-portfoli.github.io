<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Portfolio</title>
    <style>
        :root {
            --bg-start: #2d5016;
            --bg-end: #8B4513;
            --accent: #2d5016;
            --text: #333;
            --shadow: rgba(0,0,0,0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: rgba(255,255,255,0.97);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 24px 60px var(--shadow);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo .icon {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .login-logo .icon svg {
            width: 32px;
            height: 32px;
            fill: white;
        }

        .login-logo h1 {
            font-size: 1.5rem;
            background: linear-gradient(45deg, var(--bg-start), var(--bg-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-logo p {
            font-size: 0.9rem;
            color: #888;
            margin-top: 0.25rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.4rem;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            color: var(--text);
            transition: border-color 0.2s;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        .login-btn {
            width: 100%;
            padding: 0.85rem;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            color: white;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
            margin-top: 0.5rem;
        }

        .login-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .login-btn:active { transform: translateY(0); }

        .error-msg {
            background: #fff0f0;
            border: 1px solid #ffcccc;
            color: #c0392b;
            border-radius: 8px;
            padding: 0.7rem 1rem;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--accent); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <div class="icon">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
            </div>
            <h1>Admin Login</h1>
            <p>Portfolio management panel</p>
        </div>

        <div class="error-msg" id="error-msg">Incorrect username or password.</div>

        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="login-btn">Sign in</button>
        </form>

        <a href="index.html" class="back-link">← Back to portfolio</a>
    </div>

    <script>
        // Redirect if already logged in
        if (sessionStorage.getItem('adminLoggedIn') === 'true') {
            window.location.href = 'admin-dashboard.html';
        }

        const ADMIN_USER = 'admin';
        const ADMIN_PASS = 'Portfolio2026!';

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const err  = document.getElementById('error-msg');

            if (user === ADMIN_USER && pass === ADMIN_PASS) {
                sessionStorage.setItem('adminLoggedIn', 'true');
                window.location.href = 'admin-dashboard.html';
            } else {
                err.style.display = 'block';
                document.getElementById('password').value = '';
            }
        });
    </script>
</body>
</html>
